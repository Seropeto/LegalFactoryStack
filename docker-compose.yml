services:
  db-legal:
    image: postgres:15-alpine
    container_name: db-legal-factory
    restart: always
    volumes:
      - v_db_legal:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_USER: toxiro_admin
      POSTGRES_PASSWORD: toxiro_password_change_me
      POSTGRES_DB: legal_db
    networks:
      - net-legal

  api-legal:
    image: directus/directus:latest
    container_name: api-legal-factory
    restart: always
    ports:
      - "8055:8055"
    environment:
      KEY: "legal-factory-very-secret-key"
      SECRET: "legal-factory-very-secret-secret"
      DB_CLIENT: "pg"
      DB_HOST: "db-legal"
      DB_PORT: "5432"
      DB_DATABASE: "legal_db"
      DB_USER: "toxiro_admin"
      DB_PASSWORD: "toxiro_password_change_me"
      ADMIN_EMAIL: "admin@toxirodigital.cloud"
      ADMIN_PASSWORD: "admin"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:5173"
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      CORS_EXPOSE_HEADERS: "Content-Range"
      CORS_CREDENTIALS: "true"
    depends_on:
      - db-legal
    networks:
      - net-legal

  n8n-legal:
    image: n8nio/n8n:latest
    container_name: n8n-legal-factory
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - v_n8n_legal:/home/node/.n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "admin"
      N8N_BASIC_AUTH_PASSWORD: "toxiro_password_change_me"
    networks:
      - net-legal

networks:
  net-legal:
    driver: bridge

volumes:
  v_db_legal:
  v_n8n_legal:
