version: '3.8'

# ============================================================
# Stack de Producción — VPS
# Uso: docker-compose -f docker-compose-vps.yml --env-file .env.prod up -d
# ============================================================

services:

  # ── Frontend (Vite build) servido por nginx ──────────────
  frontend:
    image: nginx:alpine
    container_name: frontend-pro
    restart: always
    ports:
      - "80:80"       # HTTP — configurar SSL con certbot en el host
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-legal
    networks:
      - net-pro

  # ── PostgreSQL legal (Directus) ──────────────────────────
  db-legal:
    image: postgres:15-alpine
    container_name: db-legal-pro
    restart: always
    volumes:
      - v_db_legal_pro:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_USER: toxiro_admin
      POSTGRES_PASSWORD: ${DB_PASS_LEGAL}
      POSTGRES_DB: legal_db
    networks:
      - net-pro

  # ── PostgreSQL WhatsApp (Evolution) ─────────────────────
  db-whatsapp:
    image: postgres:15-alpine
    container_name: db-whatsapp-pro
    restart: always
    volumes:
      - v_db_whatsapp_pro:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: evolution_admin
      POSTGRES_PASSWORD: ${DB_PASS_EVOLUTION}
      POSTGRES_DB: evolution_db
    networks:
      - net-pro

  # ── Directus API ─────────────────────────────────────────
  api-legal:
    image: directus/directus:latest
    container_name: api-legal-pro
    restart: always
    # Sin expose de puertos al exterior — nginx hace el proxy
    expose:
      - "8055"
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: "pg"
      DB_HOST: "db-legal"
      DB_PORT: "5432"
      DB_DATABASE: "legal_db"
      DB_USER: "toxiro_admin"
      DB_PASSWORD: ${DB_PASS_LEGAL}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"   # Acepta el origen del proxy nginx
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      CORS_EXPOSE_HEADERS: "Content-Range"
      CORS_CREDENTIALS: "true"
      PUBLIC_URL: "/directus"
    depends_on:
      - db-legal
    networks:
      - net-pro

  # ── n8n Automatización ───────────────────────────────────
  n8n-legal:
    image: n8nio/n8n:latest
    container_name: n8n-legal-pro
    restart: always
    expose:
      - "5678"
    volumes:
      - v_n8n_pro:/home/node/.n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "admin"
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASS}
      WEBHOOK_URL: "http://n8n-legal:5678"
    networks:
      - net-pro

  # ── Evolution API (WhatsApp) ─────────────────────────────
  whatsapp-api:
    image: atendai/evolution-api:v2.2.0
    container_name: whatsapp-api-pro
    restart: always
    expose:
      - "8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_TYPE: "apikey"
      SERVER_TYPE_HTTP: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution_admin:${DB_PASS_EVOLUTION}@db-whatsapp:5432/evolution_db"
      DATABASE_CONNECTION_CLIENT: "pg"
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      DATABASE_SAVE_DATA_INSTANCE: "false"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      INTEGRATIONS: "WHATSAPP-BAILEYS"
    volumes:
      - v_evolution_pro:/evolution/instances
    depends_on:
      - db-whatsapp
    networks:
      - net-pro

networks:
  net-pro:
    driver: bridge

volumes:
  v_db_legal_pro:
  v_n8n_pro:
  v_evolution_pro:
  v_db_whatsapp_pro:
