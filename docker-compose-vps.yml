# ============================================================
# ToxiroAbogados — Docker Compose para Dokploy (produccion)
# 3 servicios: db-legal, api-legal, web
# n8n NO se incluye (corre en proyecto separado "Automatizaciones")
# Traefik/SSL gestionado automaticamente por Dokploy
# ============================================================

services:
  db-legal:
    image: postgres:15-alpine
    restart: always
    volumes:
      - toxiro_db_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_USER: toxiro_admin
      POSTGRES_PASSWORD: ${DB_PASS_LEGAL}
      POSTGRES_DB: legal_db
    networks:
      - toxiro-net

  api-legal:
    image: directus/directus:latest
    restart: always
    volumes:
      - toxiro_uploads:/directus/uploads
      - toxiro_extensions:/directus/extensions
    environment:
      # Directus core
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      # Base de datos
      DB_CLIENT: "pg"
      DB_HOST: "db-legal"
      DB_PORT: "5432"
      DB_DATABASE: "legal_db"
      DB_USER: "toxiro_admin"
      DB_PASSWORD: ${DB_PASS_LEGAL}
      # Admin inicial
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      # URL publica (para assets, redirects, etc.)
      PUBLIC_URL: "https://api.toxirodigital.cloud"
      # CORS — solo permitir el frontend
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://abogados.toxirodigital.cloud"
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      CORS_EXPOSE_HEADERS: "Content-Range"
      CORS_CREDENTIALS: "true"
      # Permite llamadas HTTP internas (Directus Flows -> n8n, Twilio, etc.)
      IMPORT_IP_DENY_LIST: ""
    depends_on:
      - db-legal
    networks:
      - toxiro-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "https://api.toxirodigital.cloud"
    restart: always
    networks:
      - toxiro-net

networks:
  toxiro-net:
    driver: bridge

volumes:
  toxiro_db_data:
  toxiro_uploads:
  toxiro_extensions:
